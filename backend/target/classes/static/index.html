<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>在线考试系统</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section id="loginView" class="login-shell">
        <div class="login-card card">
          <div class="brand-block">
            <p class="eyebrow">ONLINE EXAM</p>
            <h1>在线考试系统</h1>
          </div>
          <form id="loginForm" class="form-grid">
            <label>
              <span>账号</span>
              <input name="username" value="admin" required />
            </label>
            <label>
              <span>密码</span>
              <input type="password" name="password" value="123456" required />
            </label>
            <button type="submit" class="primary-btn wide">进入系统</button>
          </form>
          <p id="loginMessage" class="message"></p>
        </div>
      </section>

      <section id="dashboardView" class="workspace-shell hidden"></section>
    </main>

    <div id="modal" class="modal hidden">
      <div class="modal-card">
        <button id="closeModalBtn" class="close-btn" type="button">×</button>
        <div id="modalContent"></div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
