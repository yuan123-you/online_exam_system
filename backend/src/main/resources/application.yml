server:
  port: ${PORT:8080}
  error:
    whitelabel:
      enabled: false

spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/online_exam_system?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&tinyInt1isBit=false}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8
      continue-on-error: true

ai:
  api-url: https://open.bigmodel.cn/api/paas/v4/chat/completions
  api-key: ${AI_API_KEY:82f20bac24a545c595dc30f7eee3dfd1.eJmxuTgiNAxaDNEX}
  model: glm-4-flash
  timeout-ms: 90000
  rate-limit-per-minute: 60
  concurrent-limit: 10
  circuit-breaker:
    failure-threshold: 10
    reset-timeout-seconds: 30
  thread-pool:
    core-size: 10
    max-size: 40
    queue-capacity: 300
    keep-alive-seconds: 60

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,https://web.novo.ccwu.cc,http://web.novo.ccwu.cc}

logging:
  level:
    org.springframework.jdbc.datasource.init: warn
